name: Setup Logos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # ✅ updated

      - name: Create logos folder
        run: mkdir -p src/assets/logos

      - name: Download logos
        run: |
          set -e
          curl -fL https://logo.clearbit.com/amazon.com -o src/assets/logos/amazon.png
          curl -fL https://logo.clearbit.com/billa.at -o src/assets/logos/billa.png
          curl -fL https://logo.clearbit.com/spar.at -o src/assets/logos/spar.png
          curl -fL https://logo.clearbit.com/lidl.at -o src/assets/logos/lidl.png
          curl -fL https://logo.clearbit.com/mcdonalds.com -o src/assets/logos/mcdonalds.png
          curl -fL https://logo.clearbit.com/fitinn.at -o src/assets/logos/fitinn.png
          curl -fL https://logo.clearbit.com/cineplexx.at -o src/assets/logos/cineplexx.png

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add src/assets/logos
          git commit -m "add logos automatically" || echo "no changes"
          git push origin HEAD:main
