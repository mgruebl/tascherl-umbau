name: Setup Logos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create logos folder
        run: mkdir -p src/assets/logos

      - name: Download logos
        run: |
          curl -L https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg -o src/assets/logos/amazon.svg
          curl -L https://upload.wikimedia.org/wikipedia/commons/2/2e/Billa_Logo.png -o src/assets/logos/billa.png
          curl -L https://upload.wikimedia.org/wikipedia/commons/7/7e/Spar-logo.png -o src/assets/logos/spar.png
          curl -L https://upload.wikimedia.org/wikipedia/commons/0/0e/Lidl_logo.svg -o src/assets/logos/lidl.svg
          curl -L https://upload.wikimedia.org/wikipedia/commons/4/4e/McDonalds_logo.svg -o src/assets/logos/mcdonalds.svg

      - name: Commit logos
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add src/assets/logos
          git commit -m "add logos" || echo "no changes"
          git push origin HEAD:main
